<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Gear shape (golden yellow) -->
  <g fill="#FDCC04">
    <!-- Gear teeth and body -->
    <path d="M50 8 L54 2 L58 8 L64 6 L65 13 L71 14 L69 21 L75 25 L70 31 L74 37 L68 40 L69 47 L63 48 L61 55 L55 53 L50 58 L45 53 L39 55 L37 48 L31 47 L32 40 L26 37 L30 31 L25 25 L31 21 L29 14 L35 13 L36 6 L42 8 Z"/>
    <!-- Inner circle (dark background for crescent) -->
    <circle cx="50" cy="33" r="22" fill="#111111"/>
    <!-- Crescent moon arc (golden) -->
    <path d="M50 13 A20 20 0 1 1 50 53 A14 14 0 1 0 50 13 Z" fill="#FDCC04" opacity="0.9"/>
  </g>
  <!-- Camera body (purple) -->
  <g fill="#8B44D6" transform="translate(34, 24)">
    <!-- Camera top bump -->
    <rect x="9" y="0" width="14" height="4" rx="2"/>
    <!-- Camera body -->
    <rect x="2" y="4" width="28" height="18" rx="3"/>
    <!-- Lens (white circle + purple) -->
    <circle cx="16" cy="13" r="7" fill="white"/>
    <circle cx="16" cy="13" r="5" fill="#8B44D6"/>
    <circle cx="16" cy="13" r="2.5" fill="white" opacity="0.4"/>
    <!-- Viewfinder dot -->
    <circle cx="25" cy="7" r="1.5" fill="white" opacity="0.7"/>
  </g>
</svg>
