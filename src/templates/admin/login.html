<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - BRAND FACTORY</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-blue: #6B21C8;
            --accent-yellow: #FDCC04;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1a0533, #2d0f5e, #6B21C8);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-card h2 {
            font-family: 'Anton', sans-serif;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: var(--accent-yellow);
        }

        .login-card p {
            margin-bottom: 30px;
            font-size: 0.9rem;
            color: #ccc;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: none;
            outline: none;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: var(--accent-yellow);
            color: var(--primary-blue);
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        .flash {
            background: #ff4c4c;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h2>BRAND FACTORY PANEL</h2>
        <p>Secure Admin Access</p>

        {% with messages = get_flashed_messages(category_filter=["error"]) %}
        {% if messages %}
        {% for message in messages %}
        <div class="flash">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin.login') }}" method="POST">
            <input type="password" name="passcode" placeholder="Enter Admin Password" required autofocus>
            <button type="submit">Login to Dashboard</button>
        </form>
        <div style="margin-top: 20px;">
            <a href="{{ url_for('admin.forgot_password') }}"
                style="color: #ccc; text-decoration: none; font-size: 0.9em;">Forgot Passcode?</a>
        </div>
    </div>

</body>

</html>
