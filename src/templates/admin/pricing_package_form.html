{% extends "admin/base.html" %}
{% block content %}
<div class="admin-header">
    <h2>{{ 'Edit' if package else 'Add' }} Pricing Package</h2>
    <a href="{{ url_for('admin.pricing') }}" class="btn btn-secondary">Back</a>
</div>

<div class="admin-card" style="max-width: 800px; margin: 0 auto;">
    <form method="POST">
        <div class="form-group mb-3">
            <label>Package Name (Arabic)</label>
            <input type="text" name="name_ar" class="form-control" value="{{ package.name_ar if package else '' }}" required>
        </div>
        <div class="form-group mb-3">
            <label>Package Name (English)</label>
            <input type="text" name="name_en" class="form-control" value="{{ package.name_en if package else '' }}" required>
        </div>
        
        <div class="form-group mb-3" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>Side</label>
                <select name="side" class="form-control">
                    <option value="left" {{ 'selected' if package and package.side == 'left' else '' }}>Left Column</option>
                    <option value="right" {{ 'selected' if package and package.side == 'right' else '' }}>Right Column</option>
                </select>
            </div>
            <div>
                <label>Order Index</label>
                <input type="number" name="order_index" class="form-control" value="{{ package.order_index if package else 0 }}">
            </div>
        </div>

        <div class="form-group mb-3">
            <label>Description (Arabic) - Optional</label>
            <textarea name="description_ar" class="form-control">{{ package.description_ar if package else '' }}</textarea>
        </div>
        <div class="form-group mb-4">
            <label>Description (English) - Optional</label>
            <textarea name="description_en" class="form-control">{{ package.description_en if package else '' }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100">Save Package</button>
    </form>
</div>
{% endblock %}
