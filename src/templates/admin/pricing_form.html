{% extends "admin/base.html" %}
{% block content %}
<div class="admin-header">
    <h2>{{ 'Edit' if item else 'Add' }} Pricing Item</h2>
    <a href="{{ url_for('admin.pricing') }}" class="btn btn-secondary">Back</a>
</div>

<div class="admin-card" style="max-width: 800px; margin: 0 auto;">
    <form method="POST">
        <div class="form-group mb-3">
            <label>Name (Arabic)</label>
            <input type="text" name="name_ar" class="form-control" value="{{ item.name_ar if item else '' }}" required>
        </div>
        <div class="form-group mb-3">
            <label>Name (English)</label>
            <input type="text" name="name_en" class="form-control" value="{{ item.name_en if item else '' }}" required>
        </div>
        <div class="form-group mb-3" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>Side</label>
                <select name="side" class="form-control">
                    <option value="left" {{ 'selected' if item and item.side == 'left' else '' }}>Left Column</option>
                    <option value="right" {{ 'selected' if item and item.side == 'right' else '' }}>Right Column</option>
                </select>
            </div>
            <div>
                <label>Package (Optional)</label>
                <select name="package_id" class="form-control">
                    <option value="">None (Standalone)</option>
                    {% for pkg in packages %}
                    <option value="{{ pkg.id }}" {{ 'selected' if item and item.package_id == pkg.id else '' }}>
                        {{ pkg.name_en }} ({{ pkg.side|capitalize }})
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group mb-3">
            <label>Price (e.g., 50,000 IQD)</label>
            <input type="text" name="price" class="form-control" value="{{ item.price if item else '' }}">
        </div>
        <div class="form-group mb-3" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label>Category (Arabic)</label>
                <input type="text" name="category_ar" class="form-control" value="{{ item.category_ar if item else '' }}">
            </div>
            <div>
                <label>Category (English)</label>
                <input type="text" name="category_en" class="form-control" value="{{ item.category_en if item else '' }}">
            </div>
        </div>
        <div class="form-group mb-3">
            <label>Description (Arabic)</label>
            <textarea name="description_ar" class="form-control">{{ item.description_ar if item else '' }}</textarea>
        </div>
        <div class="form-group mb-3">
            <label>Description (English)</label>
            <textarea name="description_en" class="form-control">{{ item.description_en if item else '' }}</textarea>
        </div>
        <div class="form-group mb-4">
            <label>Order Index</label>
            <input type="number" name="order_index" class="form-control" value="{{ item.order_index if item else 0 }}">
        </div>
        <button type="submit" class="btn btn-primary w-100">Save Item</button>
    </form>
</div>
{% endblock %}
